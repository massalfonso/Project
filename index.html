<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Regenerative Braking – Chart.js v3</title>

  <!-- Chart.js v3 -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>

  <style>
    body {
      background: #0b1020;
      color: white;
      font-family: system-ui;
      padding: 20px;
    }
    canvas {
      max-width: 900px;
      margin-bottom: 40px;
    }
  </style>
</head>
<body>

<h2>Efficiency vs Time</h2>
<canvas id="effChart"></canvas>

<h2>Charging Current & Voltage vs Time</h2>
<canvas id="ivChart"></canvas>

<script>
/* ============================
   STATIC DEMO VALUES
   ============================ */
const demo = {
  labels: ["0s","1s","2s","3s","4s","5s"],
  efficiency: [55, 60, 62, 65, 63, 66],
  current:    [10, 25, 40, 55, 45, 60],
  voltage:    [48, 49, 50, 51, 50, 52],
  rpm:        [3200, 3000, 2800, 2600, 2400, 2200],
  motorTemp:  68,
  battTemp:   42
};

/* ============================
   KPI TEXT
   ============================ */
kEff.innerText  = demo.efficiency.at(-1) + "%";
kI.innerText    = demo.current.at(-1) + " A";
kV.innerText    = demo.voltage.at(-1) + " V";
kRPM.innerText  = demo.rpm.at(-1);

gRPMv.innerText = demo.rpm.at(-1);
gIv.innerText   = demo.current.at(-1) + " A";
gTMv.innerText  = demo.motorTemp + " °C";
gTBv.innerText  = demo.battTemp + " °C";

/* ============================
   GAUGE DRAWING
   ============================ */
function drawGauge(c,v,min,max,label,unit){
  const ctx=c.getContext("2d");
  const w=c.width=c.clientWidth;
  const h=c.height=c.clientHeight;

  ctx.clearRect(0,0,w,h);

  const cx=w/2, cy=h*0.65, r=Math.min(w,h)*0.45;
  const start=Math.PI*0.8, end=Math.PI*2.2;
  const t=Math.min(1,Math.max(0,(v-min)/(max-min)));

  ctx.lineWidth=r*0.18;
  ctx.strokeStyle="rgba(255,255,255,.15)";
  ctx.beginPath();
  ctx.arc(cx,cy,r,start,end);
  ctx.stroke();

  ctx.strokeStyle="#4ade80";
  ctx.beginPath();
  ctx.arc(cx,cy,r,start,start+(end-start)*t);
  ctx.stroke();

  const ang=start+(end-start)*t;
  ctx.strokeStyle="#fff";
  ctx.lineWidth=3;
  ctx.beginPath();
  ctx.moveTo(cx,cy);
  ctx.lineTo(cx+Math.cos(ang)*r*0.9,cy+Math.sin(ang)*r*0.9);
  ctx.stroke();

  ctx.textAlign="center";
  ctx.fillStyle="#fff";
  ctx.font="12px system-ui";
  ctx.fillText(label,cx,h*0.2);
  ctx.font="14px system-ui";
  ctx.fillText(Math.round(v)+" "+unit,cx,h*0.4);
}

drawGauge(gRPM, demo.rpm.at(-1), 0, 6000, "RPM", "");
drawGauge(gI,   demo.current.at(-1), 0, 120, "Current", "A");
drawGauge(gTM,  demo.motorTemp, 0, 120, "Motor", "°C");
drawGauge(gTB,  demo.battTemp,  0, 90,  "Battery", "°C");

/* ============================
   CHART.JS v3 CONFIG
   ============================ */
const baseOptions = {
  responsive: true,
  plugins: {
    legend: { labels: { color: "#fff" } }
  },
  scales: {
    x: { ticks: { color: "#fff" }, grid: { color: "rgba(255,255,255,.1)" } },
    y: { ticks: { color: "#fff" }, grid: { color: "rgba(255,255,255,.1)" } }
  }
};

new Chart(document.getElementById("effChart"), {
  type: "line",
  data: {
    labels: demo.labels,
    datasets: [{
      label: "Efficiency (%)",
      data: demo.efficiency,
      borderColor: "#4ade80",
      tension: 0.3
    }]
  },
  options: baseOptions
});

new Chart(document.getElementById("ivChart"), {
  type: "line",
  data: {
    labels: demo.labels,
    datasets: [
      {
        label: "Charging Current (A)",
        data: demo.current,
        borderColor: "#60a5fa",
        tension: 0.3
      },
      {
        label: "Battery Voltage (V)",
        data: demo.voltage,
        borderColor: "#a78bfa",
        tension: 0.3
      }
    ]
  },
  options: baseOptions
});

new Chart(document.getElementById("rpmChart"), {
  type: "line",
  data: {
    labels: demo.labels,
    datasets: [{
      label: "RPM",
      data: demo.rpm,
      borderColor: "#fbbf24",
      tension: 0.3
    }]
  },
  options: baseOptions
});
</script>


</body>
</html>
