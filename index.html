<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Regenerative Braking Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Chart.js v3 -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>

<style>
:root {
  --bg:#0b1020;
  --panel:rgba(255,255,255,.06);
  --panel2:rgba(255,255,255,.08);
  --border:rgba(255,255,255,.12);
  --text:#fff;
  --muted:rgba(255,255,255,.65);
  --good:#4ade80;
  --warn:#fbbf24;
  --bad:#fb7185;
  --accent:#60a5fa;
  --accent2:#a78bfa;
  --radius:18px;
}

*{box-sizing:border-box}
body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:system-ui;
}

.wrap{
  max-width:1300px;
  margin:auto;
  padding:24px;
}

header{
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
  margin-bottom:24px;
}

h1{margin:0 0 6px 0;font-size:28px}
.subtitle{color:var(--muted);font-size:13px}

.grid{
  display:grid;
  grid-template-columns:1.2fr .8fr;
  gap:16px;
}

.card{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:var(--radius);
}

.hd{
  padding:14px;
  border-bottom:1px solid var(--border);
  font-weight:600;
}

.bd{padding:14px}

.kpis{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
}

.kpi{
  background:var(--panel2);
  padding:12px;
  border-radius:14px;
}

.kpi .label{color:var(--muted);font-size:12px}
.kpi .val{font-size:20px;font-weight:700}

.chartBox{
  margin-top:14px;
  background:rgba(255,255,255,.04);
  border:1px solid var(--border);
  border-radius:14px;
  padding:10px;
}

canvas{width:100%;height:250px}

.side{display:grid;gap:16px}

.gauges{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.gauge{
  background:rgba(255,255,255,.05);
  border:1px solid var(--border);
  border-radius:14px;
  padding:12px;
}

.gauge .top{
  display:flex;
  justify-content:space-between;
  font-size:13px;
}

.dial{
  height:150px;
  width:100%;
  display:block;
}

.gauge-val{
  text-align:center;
  font-size:15px;
  font-weight:600;
  margin-top:4px;
  color:var(--text);
}
</style>
</head>

<body>
<div class="wrap">

<header>
  <h1>Regenerative Braking Dashboard</h1>
  <div class="subtitle">Charging &amp; thermal monitoring</div>
</header>

<div class="grid">

<!-- MAIN -->
<section class="card">
  <div class="hd">Overview</div>
  <div class="bd">

    <div class="kpis">
      <div class="kpi"><div class="label">Charge Current</div><div class="val" id="kI">-- A</div></div>
      <div class="kpi"><div class="label">Battery Voltage</div><div class="val" id="kV">-- V</div></div>
      <div class="kpi"><div class="label">RPM</div><div class="val" id="kRPM">--</div></div>
    </div>

    <div class="chartBox"><canvas id="ivChart"></canvas></div>

  </div>
</section>

<!-- SIDEBAR -->
<aside class="side">

<section class="card">
  <div class="hd">Gauges</div>
  <div class="bd gauges">

    <div class="gauge">
      <div class="top"><span>RPM</span></div>
      <canvas class="dial" id="gRPM"></canvas>
      <div class="gauge-val" id="gRPMv">--</div>
    </div>

    <div class="gauge">
      <div class="top"><span>Charge Current</span></div>
      <canvas class="dial" id="gI"></canvas>
      <div class="gauge-val" id="gIv">-- A</div>
    </div>

    <div class="gauge">
      <div class="top"><span>Motor Temp</span></div>
      <canvas class="dial" id="gTM"></canvas>
      <div class="gauge-val" id="gTMv">-- °C</div>
    </div>

    <div class="gauge">
      <div class="top"><span>Battery Temp</span></div>
      <canvas class="dial" id="gTB"></canvas>
      <div class="gauge-val" id="gTBv">-- °C</div>
    </div>

  </div>
</section>

</aside>
</div>
</div>

<script>
/* GAUGE GRAPHIC - no longer sets canvas size, just draws */
function drawGauge(c, v, min, max) {
  const ctx = c.getContext("2d");
  const w = c.width;
  const h = c.height;
  ctx.clearRect(0, 0, w, h);

  const cx = w / 2, cy = h * 0.65, r = Math.min(w, h) * 0.45;
  const start = Math.PI * 0.8, end = Math.PI * 2.2;
  const t = Math.min(Math.max((v - min) / (max - min), 0), 1);

  ctx.lineWidth = r * 0.18;
  ctx.strokeStyle = "rgba(255,255,255,.15)";
  ctx.beginPath();
  ctx.arc(cx, cy, r, start, end);
  ctx.stroke();

  ctx.strokeStyle = "#4ade80";
  ctx.beginPath();
  ctx.arc(cx, cy, r, start, start + (end - start) * t);
  ctx.stroke();

  const ang = start + (end - start) * t;
  ctx.strokeStyle = "#fff";
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.lineTo(cx + Math.cos(ang) * r * 0.9, cy + Math.sin(ang) * r * 0.9);
  ctx.stroke();
}

/* INIT GAUGE CANVAS SIZES ONCE ON LOAD */
function initGauges() {
  [gRPM, gI, gTM, gTB].forEach(c => {
    c.width  = c.offsetWidth  || 150;
    c.height = c.offsetHeight || 150;
  });
}

/* CHART.JS BASE OPTIONS */
const baseOptions = {
  responsive: true,
  maintainAspectRatio: false,
  plugins: {legend: {labels: {color: "#fff"}}},
  scales: {
    x: {ticks: {color: "#fff"}, grid: {color: "rgba(255,255,255,.1)"}},
    y: {ticks: {color: "#fff"}, grid: {color: "rgba(255,255,255,.1)"}}
  }
};

/* INITIALIZE CHART - empty arrays, no dummy data */
const ivChart = new Chart(document.getElementById('ivChart'), {
  type: "line",
  data: {
    labels: [],
    datasets: [
      {label: "Current (A)", data: [], borderColor: "#60a5fa", tension: .3},
      {label: "Voltage (V)", data: [], borderColor: "#a78bfa", tension: .3}
    ]
  },
  options: baseOptions
});

/* ------------------------------------------
   WEBSOCKET CONNECTION
------------------------------------------- */

document.addEventListener("DOMContentLoaded", () => {
  initGauges();

  const socket = new WebSocket("ws://project.local:8080");

  socket.onopen = () => {
    console.log("✓ WebSocket connected");
  };

  socket.onerror = (error) => {
    console.error("WebSocket error:", error);
  };

  socket.onclose = () => {
    console.log("WebSocket disconnected");
  };

  socket.onmessage = (event) => {
    const data = JSON.parse(event.data);

    const voltage  = data.voltage;
    const current  = data.current;
    const rpm      = data.rpm;
    const temp     = data.temp;
    const battTemp = data.battTemp;

    // UPDATE KPI TEXT
    kV.innerText   = voltage.toFixed(2) + " V";
    kI.innerText   = current.toFixed(2) + " A";
    kRPM.innerText = rpm.toFixed(2);

    // UPDATE GAUGE VALUE LABELS BELOW DIALS
    gRPMv.innerText = rpm.toFixed(2);
    gIv.innerText   = current.toFixed(2) + " A";
    gTMv.innerText  = temp.toFixed(2) + " °C";
    gTBv.innerText  = battTemp.toFixed(2) + " °C";

    // REDRAW GAUGES (canvas size already set, just redraw)
    drawGauge(gRPM, rpm,      0,   6000);
    drawGauge(gI,   current,  0,   120);
    drawGauge(gTM,  temp,     0,   120);
    drawGauge(gTB,  battTemp, 0,   90);

    // UPDATE CHART (keep last 20 points)
    if (ivChart.data.labels.length > 20) {
      ivChart.data.labels.shift();
      ivChart.data.datasets[0].data.shift();
      ivChart.data.datasets[1].data.shift();
    }
    ivChart.data.labels.push("");
    ivChart.data.datasets[0].data.push(current);
    ivChart.data.datasets[1].data.push(voltage);
    ivChart.update('none');
  };
});
</script>
</body>
</html>
